  .logo{font-size:26px;font-weight:600;color:#fff;letter-spacing:2px;margin-bottom:.2rem}
  .logo span{color:#e94560}
  .tagline{font-size:12px;color:rgba(255,255,255,.5)}
  .lang-bar{display:flex;gap:8px}
  .lang-btn{padding:6px 14px;border-radius:20px;border:1px solid #a5d6a7;background:#ffffff;color:#2e7d32;font-size:11px;cursor:pointer;transition:.15s;white-space:nowrap}
  .lang-btn:hover{border-color:#2e7d32}
  .lang-btn.active{background:#e94560;border-color:#e94560;color:#fff}
  .top-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:.85rem;position:sticky;top:0;z-index:100;background:#f1f8f2;padding:.6rem 0;border-bottom:1px solid #c8e6c9}
  .search-wrap{flex:1;min-width:160px;position:relative;display:flex;align-items:center}
  .search-input{width:100%;padding:7px 34px 7px 12px;border-radius:8px;border:1px solid #a5d6a7;background:#ffffff;color:#1b3a1f;font-size:13px;outline:none}
  .search-input:focus{border-color:#e94560}
  .search-input::placeholder{color:#5a8a5e}
  .search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#555;pointer-events:none}
  .filter-toggle-btn{padding:7px 14px;border-radius:8px;border:1px solid #a5d6a7;background:#ffffff;color:#2e7d32;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s;flex-shrink:0}
  .filter-toggle-btn:hover{border-color:#2e7d32}
  .filter-toggle-btn.open{background:#2e7d32;border-color:#2e7d32;color:#fff}
  .filter-panel{display:none}
  .filter-panel.open{display:contents}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #a5d6a7;background:#ffffff;color:#2e7d32;font-size:11px;cursor:pointer;transition:.15s;white-space:nowrap;position:relative}
  .filter-btn:hover{border-color:#2e7d32}
  .filter-btn.active{background:#e94560;border-color:#e94560;color:#fff}
  .grade-filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #a5d6a7;background:#ffffff;color:#2e7d32;font-size:11px;cursor:pointer;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:4px}
  .grade-filter-btn:hover{border-color:#2e7d32}
  .grade-filter-btn.active{background:#6a3aa0;border-color:#6a3aa0;color:#fff}
  .add-btn{padding:6px 14px;border-radius:20px;border:1px solid #e94560;background:transparent;color:#e94560;font-size:11px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:.15s}
  .add-btn:hover{background:#e94560;color:#fff}
  .lock-btn{padding:6px 14px;border-radius:20px;border:1px solid #a5d6a7;background:#ffffff;color:#2e7d32;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
  .lock-btn.unlocked{border-color:#3a6a3a;color:#6abf69}
  .account-btn{padding:6px 14px;border-radius:20px;border:1px solid #a5d6a7;background:#ffffff;color:#2e7d32;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
  .account-btn.logged-in{border-color:#3a6a8a;color:#7ec8e3}
  .fav-heart-row{margin-bottom:7px}
  .fav-heart-btn{width:30px;height:26px;border-radius:8px;background:#e8f5e9;border:1px solid #a5d6a7;color:#1b3a1f;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .fav-heart-btn:hover{border-color:#e94560;transform:scale(1.05)}
  .fav-heart-btn.favorited{color:#ff4d6d;border-color:#5a2030}
  .section-title{font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px;margin-bottom:.75rem}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1rem}
  @media(max-width:700px){.grid{grid-template-columns:repeat(3,1fr);gap:.6rem}}

  .card{background:#ffffff;border:1px solid #a5d6a7;border-radius:12px;overflow:hidden;transition:.15s;display:flex;flex-direction:column}
  .card:hover{border-color:#81c784}
  .card-img-wrap{width:100%;padding-top:140%;position:relative;background:#e8f5e9;border-bottom:1px solid #a5d6a7;overflow:hidden;cursor:pointer}
  .card-img-wrap:hover .img-zoom-hint{opacity:1}
  .img-zoom-hint{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:2px 6px;border-radius:6px;opacity:0;transition:.2s;z-index:3;pointer-events:none}
  .slider-track{position:absolute;inset:0;display:flex;transition:transform .3s ease}
  .slide{min-width:100%;height:100%;position:relative;flex-shrink:0}
  .slide img{width:100%;height:100%;object-fit:contain;object-position:center;display:block}
  .slide .placeholder-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;color:#2a2a4e}
  .series-badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;z-index:4}
  .badge-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
  .badge-pokemon{background:#FAEEDA;color:#633806}
  .badge-onepiece{background:#FCEBEB;color:#501313}
  .badge-yugioh{background:#EEEDFE;color:#26215C}
  .badge-other{background:#E1F5EE;color:#085041}
  .grade-badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;z-index:4;background:#2a1a4e;color:#c9a8ff}
  .slide-counter{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:2px 7px;border-radius:8px;z-index:4;white-space:nowrap}
  .slide-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;transition:.15s}
  .slide-arrow:hover{background:rgba(0,0,0,.85)}
  .slide-arrow.left{left:5px}
  .slide-arrow.right{right:5px}
  .card-body{padding:.7rem .85rem;flex:1;display:flex;flex-direction:column}
  .card-name{font-size:13px;font-weight:600;color:#1b3a1f;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-meta{font-size:10px;color:#2e7d32;margin-bottom:6px}
  .card-price{font-size:14px;font-weight:600;color:#e94560;margin-bottom:7px}
  .status-row{margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
  .status-pill{font-size:9px;padding:3px 10px;border-radius:10px;border:none;font-weight:600;transition:.15s}
  .status-pill.clickable{cursor:pointer}
  .status-available{background:#1a3a1a;color:#6abf69}
  .status-sold{background:#3a1a1a;color:#e94560}
  .btn-row{display:flex;gap:5px;align-items:center;margin-top:auto}
  .btn-fb{flex:1;padding:7px 4px;border-radius:7px;border:none;background:#1877F2;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;text-decoration:none;transition:.15s;font-weight:500;white-space:nowrap}
  .btn-fb:hover{background:#1565d8}
  .btn-fb.disabled{opacity:.35;pointer-events:none}
  .btn-edit{padding:7px 9px;border-radius:7px;border:none;background:#2a2a4e;color:#a0a0ff;font-size:12px;cursor:pointer;display:flex;align-items:center;transition:.15s;flex-shrink:0}
  .btn-edit:hover{background:#3a3a6e}
  .btn-del{padding:7px 9px;border-radius:7px;border:none;background:#3a1a2a;color:#e94560;font-size:12px;cursor:pointer;display:flex;align-items:center;transition:.15s;flex-shrink:0}
  .btn-del:hover{background:#5a1a2a}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;touch-action:none}
  .lightbox.hidden{display:none}
  .lb-img-wrap{position:relative;max-width:90vw;max-height:80vh;overflow:hidden;cursor:grab;user-select:none}
  .lb-img-wrap.grabbing{cursor:grabbing}
  .lb-img{max-width:90vw;max-height:80vh;object-fit:contain;display:block;transform-origin:center center;transition:transform .2s;pointer-events:none}
  .lb-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
  .lb-btn{background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;transition:.15s}
  .lb-btn:hover{background:rgba(255,255,255,.25)}
  .lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lb-close:hover{background:rgba(255,255,255,.3)}
  .lb-counter{color:#aaa;font-size:12px}
  .lb-side-btn{position:fixed;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:24px;cursor:pointer;z-index:2001;display:flex;align-items:center;justify-content:center;transition:.15s}
  .lb-side-btn:hover{background:rgba(255,255,255,.35)}
  .lb-side-btn.left{left:10px}
  .lb-side-btn.right{right:10px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}

async function dbFetch(){
  try{
    // Use the early fetch kicked off before the module loaded, if available
    if(window.__earlyCardsPromise){
      const early=await window.__earlyCardsPromise;
      window.__earlyCardsPromise=null;
      if(early){cards=early;renderCards();return;}
    }
    const r=await fetch(API+'?order=sort_order.asc,id.asc',{headers:HEADS});
    if(!r.ok)throw new Error('fetch failed');
    cards=await r.json();
    renderCards();
  }catch(e){showToast('Load error: '+e.message,true);}
}
async function dbInsert(data){
  const r=await fetch(API,{method:'POST',headers:{...HEADS,'Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return await r.json();
}
async function dbUpdate(id,data){
  const r=await fetch(API+'?id=eq.'+id,{method:'PATCH',headers:{...HEADS,'Prefer':'return=representation'},body:JSON.stringify(data)});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return await r.json();
}
async function dbDelete(id){
  const r=await fetch(API+'?id=eq.'+id,{method:'DELETE',headers:HEADS});
  if(!r.ok){const e=await r.text();throw new Error(e);}
}

async function uploadImageBlob(blob){
  const path=`${Date.now()}_${Math.random().toString(36).slice(2,8)}.jpg`;
  const r=await fetch(`${STORAGE_UPLOAD_URL}/${path}`,{
    method:'POST',
    headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,'Content-Type':'image/jpeg'},
    body:blob
  });
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return `${STORAGE_PUBLIC_URL}/${path}`;
}

// ===== AUTH =====
function setAuthTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('auth-submit-btn').textContent=mode==='login'?t('loginBtn'):t('signupBtn');
  document.getElementById('auth-email-label').textContent=t('usernameLabel');
  document.getElementById('auth-hint').textContent='';
}

async function submitAuth(){
  const usernameRaw=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value;
  const hint=document.getElementById('auth-hint');
  if(!usernameRaw||!password){hint.textContent='Please fill in both fields.';return;}
  const username=usernameRaw.toLowerCase().replace(/[^a-z0-9_.-]/g,'');
  if(!username){hint.textContent='Please use letters or numbers for username.';return;}
  const email=username+'@luckycollectibles.app';
  hint.textContent='';
  try{
    if(authMode==='signup'){
      const {data,error}=await sb.auth.signUp({email,password});
      if(error)throw error;
      showToast(t('signupSuccess'));
    } else {
      const {data,error}=await sb.auth.signInWithPassword({email,password});
      if(error)throw error;
      showToast(t('loginSuccess'));
    }
    document.getElementById('auth-email').value='';
    document.getElementById('auth-password').value='';
    await refreshAuthState();
    closeAccountModal();
  }catch(e){
    hint.textContent=e.message||t('authError');
  }
}

async function logoutUser(){
  await sb.auth.signOut();
  currentUser=null;
  favoriteIds=new Set();
  updateAccountUI();
  closeAccountModal();
  renderCards();
}

async function refreshAuthState(){
  const {data}=await sb.auth.getSession();
  currentUser=data?.session?.user||null;
  if(currentUser){
    await loadMyFavorites();
  } else {
    favoriteIds=new Set();
  }
  updateAccountUI();
  renderCards();
}

function updateAccountUI(){
  const btn=document.getElementById('account-btn');
  const icon=document.getElementById('account-icon');
  const label=document.getElementById('account-label');
  if(currentUser){
    btn.classList.add('logged-in');
    icon.textContent='👤';
    label.textContent=currentUser.email.split('@')[0];
  } else {
    btn.classList.remove('logged-in');
    icon.textContent='👤';
    label.textContent=t('accountLabel');
  }
}

function openAccountModal(){
  document.getElementById('account-overlay').classList.remove('hidden');
  if(currentUser){
    document.getElementById('account-logged-out').classList.add('hidden');
    document.getElementById('account-logged-in').classList.remove('hidden');
    document.getElementById('account-email-display').textContent=currentUser.email.split('@')[0];
    document.getElementById('my-favorites-title').textContent=t('myFavorites');
    document.getElementById('logout-btn').textContent=t('logoutBtn');
    document.getElementById('account-close-btn').textContent=t('close');
    renderMyFavoritesList();
  } else {
    document.getElementById('account-logged-out').classList.remove('hidden');
    document.getElementById('account-logged-in').classList.add('hidden');
    document.getElementById('auth-hint').textContent='';
    setAuthTab('login');
  }
}
function closeAccountModal(){document.getElementById('account-overlay').classList.add('hidden');}
document.getElementById('account-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAccountModal();});

function renderMyFavoritesList(){
  const list=document.getElementById('my-favorites-list');
  const favCards=cards.filter(c=>favoriteIds.has(c.id));
  if(!favCards.length){list.innerHTML=`<div style="text-align:center;color:#555;font-size:12px;padding:1rem">${t('noFavorites')}</div>`;return;}
  list.innerHTML=favCards.map(c=>{
    const img=getCardImages(c)[0];
    return`<div class="fav-mini-item" onclick="goToCard(${c.id})">
      ${img?`<img class="fav-mini-img" src="${img}">`:`<div class="fav-mini-img" style="display:flex;align-items:center;justify-content:center">🃏</div>`}
      <div class="fav-mini-name">${c.name||'—'}</div>
    </div>`;
  }).join('');
}

function goToCard(cardId){
  closeAccountModal();
  // reset filters so the card is guaranteed to be visible
  filter='all';
  gradeFilter=null;
  document.getElementById('search').value='';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
  document.getElementById('grade-filter-btn').classList.remove('active');
  document.getElementById('grade-filter-label').textContent=t('gradeLabel');
  renderCards();
  setTimeout(()=>{
    const el=document.getElementById('card-'+cardId);
    if(el){
      el.scrollIntoView({behavior:'smooth',block:'center'});
      el.style.transition='box-shadow .3s';
      el.style.boxShadow='0 0 0 3px #e94560';
      setTimeout(()=>{el.style.boxShadow='';},1800);
    }
  },150);
}

// ===== FAVORITES (Supabase table) =====
async function loadMyFavorites(){
  if(!currentUser)return;
  try{
    const {data,error}=await sb.from('favorites').select('card_id').eq('user_id',currentUser.id);
    if(error)throw error;
    favoriteIds=new Set((data||[]).map(r=>r.card_id));
  }catch(e){/* table may not exist yet */}
}

async function toggleFavorite(cardId,e){
  e.stopPropagation();
  if(!currentUser){
    showToast(t('loginRequired'),true);
    openAccountModal();
    return;
  }
  const isFav=favoriteIds.has(cardId);
  try{
    if(isFav){
      const {error}=await sb.from('favorites').delete().eq('user_id',currentUser.id).eq('card_id',cardId);
      if(error)throw error;
      favoriteIds.delete(cardId);
      showToast(t('favRemoved'));
    } else {
      const {error}=await sb.from('favorites').insert({user_id:currentUser.id,card_id:cardId});
      if(error)throw error;
      favoriteIds.add(cardId);
      showToast(t('favAdded'));
    }
    renderCards();
  }catch(e){
    showToast('Error: '+e.message,true);
  }
}

let allFavoritesData=[];
async function loadAllFavoritesForAdmin(){
  try{
    const {data,error}=await sb.from('favorites').select('card_id,user_id,created_at');
    if(error)throw error;
    allFavoritesData=data||[];
  }catch(e){
    allFavoritesData=[];
    showToast('Could not load favorites: '+e.message,true);
  }
}

function renderAdminFavContent(){
  const content=document.getElementById('admin-fav-content');
  if(!allFavoritesData.length){
    content.innerHTML=`<div class="empty">${t('noFavoritesYet')}</div>`;
    return;
  }
  if(adminFavView==='card'){
    const byCard={};
    allFavoritesData.forEach(f=>{
      if(!byCard[f.card_id])byCard[f.card_id]=[];
      byCard[f.card_id].push(f.user_id);
    });
    content.innerHTML=Object.entries(byCard).map(([cardId,userIds])=>{
      const c=cards.find(x=>x.id===Number(cardId));
      const cardName=c?c.name:`Card #${cardId}`;
      return`<div class="admin-fav-group">
        <div class="admin-fav-group-title">🃏 ${cardName} <span class="admin-fav-count">${userIds.length}</span></div>
        ${userIds.map(uid=>`<div class="admin-fav-sub">👤 ${uid.slice(0,8)}...</div>`).join('')}
      </div>`;
    }).join('');
  } else {
    const byUser={};
    allFavoritesData.forEach(f=>{
      if(!byUser[f.user_id])byUser[f.user_id]=[];
      byUser[f.user_id].push(f.card_id);
    });
    content.innerHTML=Object.entries(byUser).map(([userId,cardIds])=>{
      return`<div class="admin-fav-group">
        <div class="admin-fav-group-title">👤 ${userId.slice(0,12)}... <span class="admin-fav-count">${cardIds.length}</span></div>
        ${cardIds.map(cid=>{
          const c=cards.find(x=>x.id===cid);
          return `<div class="admin-fav-sub">🃏 ${c?c.name:'Card #'+cid}</div>`;
        }).join('')}
      </div>`;
    }).join('');
  }
}

function resizeImage(file,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const MAX=900;let w=img.width,h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(cb,'image/jpeg',0.85);
    };img.src=ev.target.result;
  };reader.readAsDataURL(file);
}

function renderImgGrid(){
  const grid=document.getElementById('img-grid');
  let html='';
  imgList.forEach((src,i)=>{
    if(src==='uploading'){
      html+=`<div class="img-slot"><div class="placeholder-icon">⏳</div></div>`;
    }else{
      html+=`<div class="img-slot"><img src="${src}"><button class="img-clear" onclick="removeImgSlot(${i})">✕</button></div>`;
    }
  });
  if(imgList.length<MAX_IMAGES){
    html+=`<div class="img-add-slot"><input type="file" accept="image/*" onchange="handleMultiImageUpload(event)"><div class="img-add-icon">＋</div></div>`;
  }
  grid.innerHTML=html;
  document.getElementById('img-count-label').textContent=`${imgList.length} / ${MAX_IMAGES} ${t('imgCount')}`;
}

function handleMultiImageUpload(e){
  const file=e.target.files[0];if(!file)return;
  if(imgList.length>=MAX_IMAGES)return;
  const slot=imgList.length;
  imgList.push('uploading');
  renderImgGrid();
  resizeImage(file,async(blob)=>{
    try{
      const url=await uploadImageBlob(blob);
      imgList[slot]=url;
    }catch(err){
      imgList.splice(slot,1);
      showToast('Image upload failed',true);
    }
    renderImgGrid();
  });
  e.target.value='';
}
function removeImgSlot(i){imgList.splice(i,1);renderImgGrid();}

function openLightbox(images,index){
  lbImages=images.filter(Boolean);if(!lbImages.length)return;
  lbIndex=Math.min(index,lbImages.length-1);lbScale=1;lbDrag.curTx=0;lbDrag.curTy=0;
  document.getElementById('lightbox').classList.remove('hidden');
  document.body.style.overflow='hidden';updateLightbox();
}
function updateLightbox(){
  const img=document.getElementById('lb-img');
  img.src=lbImages[lbIndex];
  img.style.transform=`scale(${lbScale}) translate(${lbDrag.curTx/lbScale}px,${lbDrag.curTy/lbScale}px)`;
  document.getElementById('lb-counter').textContent=lbImages.length>1?`${lbIndex+1} / ${lbImages.length}`:'';
}
function closeLightbox(){document.getElementById('lightbox').classList.add('hidden');document.body.style.overflow='';lbScale=1;lbDrag.curTx=0;lbDrag.curTy=0;}
function lbZoomIn(){lbScale=Math.min(lbScale+0.5,5);updateLightbox();}
function lbZoomOut(){lbScale=Math.max(lbScale-0.5,0.5);if(lbScale===1){lbDrag.curTx=0;lbDrag.curTy=0;}updateLightbox();}
function lbReset(){lbScale=1;lbDrag.curTx=0;lbDrag.curTy=0;updateLightbox();}
function lbPrev(){lbIndex=(lbIndex-1+lbImages.length)%lbImages.length;lbScale=1;lbDrag.curTx=0;lbDrag.curTy=0;updateLightbox();}
function lbNext(){lbIndex=(lbIndex+1)%lbImages.length;lbScale=1;lbDrag.curTx=0;lbDrag.curTy=0;updateLightbox();}

document.getElementById('lb-img-wrap').addEventListener('wheel',e=>{e.preventDefault();if(e.deltaY<0)lbZoomIn();else lbZoomOut();},{passive:false});
const wrap=document.getElementById('lb-img-wrap');
wrap.addEventListener('mousedown',e=>{if(lbScale<=1)return;lbDrag.active=true;lbDrag.startX=e.clientX-lbDrag.curTx;lbDrag.startY=e.clientY-lbDrag.curTy;wrap.classList.add('grabbing');});
window.addEventListener('mousemove',e=>{if(!lbDrag.active)return;lbDrag.curTx=e.clientX-lbDrag.startX;lbDrag.curTy=e.clientY-lbDrag.startY;updateLightbox();});
window.addEventListener('mouseup',()=>{lbDrag.active=false;wrap.classList.remove('grabbing');});
let lastDist=0;
wrap.addEventListener('touchstart',e=>{if(e.touches.length===2)lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
wrap.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);lbScale=Math.min(Math.max(lbScale*(d/lastDist),0.5),5);lastDist=d;updateLightbox();}},{passive:true});
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))closeLightbox();});
window.addEventListener('keydown',e=>{if(document.getElementById('lightbox').classList.contains('hidden'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')lbPrev();if(e.key==='ArrowRight')lbNext();if(e.key==='+')lbZoomIn();if(e.key==='-')lbZoomOut();});

function updateAdminUI(){
  const a=document.getElementById('add-card-btn'),lb=document.getElementById('lock-btn');

  const mb=document.getElementById('migrate-btn');
  if(isAdmin){a.classList.remove('hidden');document.getElementById('lock-icon').textContent='🔓';document.getElementById('lock-label').textContent=t('adminOn');lb.classList.add('unlocked');fb.classList.remove('hidden');mb.classList.remove('hidden');}
  else{a.classList.add('hidden');document.getElementById('lock-icon').textContent='🔒';document.getElementById('lock-label').textContent=t('adminOff');lb.classList.remove('unlocked');fb.classList.add('hidden');mb.classList.add('hidden');}

async function migrateImagesToStorage(){
  if(!isAdmin)return;
  showToast('Migrating photos… this may take a bit');
  try{
    const r=await fetch(API+'?select=id,images,image1,image2',{headers:HEADS});
    if(!r.ok)throw new Error('Could not load cards');
    const allCards=await r.json();
    let migratedCards=0,migratedPhotos=0,failedPhotos=0;
    for(const c of allCards){
      let imgs=Array.isArray(c.images)&&c.images.length?[...c.images]:[c.image1,c.image2].filter(Boolean);
      let changed=false;
      for(let i=0;i<imgs.length;i++){
        if(imgs[i]&&typeof imgs[i]==='string'&&imgs[i].startsWith('data:')){
          try{
            const blob=await(await fetch(imgs[i])).blob();
            imgs[i]=await uploadImageBlob(blob);
            changed=true;migratedPhotos++;
          }catch(err){console.error('Migrate failed for card',c.id,err);failedPhotos++;}
        }
      }
      if(changed){
        await dbUpdate(c.id,{images:imgs,image1:imgs[0]||null,image2:imgs[1]||null});
        migratedCards++;
      }
    }
    showToast(`Done! Moved ${migratedPhotos} photo(s) on ${migratedCards} card(s)${failedPhotos?`, ${failedPhotos} failed`:''}`);
    await dbFetch();
  }catch(err){
    showToast('Migration error: '+err.message,true);
  }
}

function seriesBadge(s){
  const m={pokemon:'badge-pokemon',onepiece:'badge-onepiece',yugioh:'badge-yugioh',other:'badge-other'};
  const n={pokemon:'Pokémon',onepiece:'One Piece',yugioh:'Yu-Gi-Oh',other:'Other'};
  return`<span class="series-badge ${m[s]||'badge-other'}">${n[s]||s}</span>`;
}

async function toggleStatus(id){
  if(!isAdmin)return;
  const c=cards.find(x=>x.id===id);if(!c)return;
  const ns=c.status==='available'?'sold':'available';
  try{await dbUpdate(id,{status:ns});c.status=ns;renderCards();}
  catch(e){showToast('Error',true);}
}

function cardSlide(id,dir,total,e){
  e.stopPropagation();
  if(!window._slideIdx)window._slideIdx={};
  window._slideIdx[id]=((window._slideIdx[id]||0)+dir+total)%total;
  const track=document.getElementById('track-'+id);
  if(track)track.style.transform=`translateX(-${window._slideIdx[id]*100}%)`;
  const ctr=document.getElementById('ctr-'+id);
  if(ctr)ctr.textContent=`${window._slideIdx[id]+1} / ${total}`;
}

function getCardImages(c){
  if(c.images&&Array.isArray(c.images)&&c.images.length)return c.images.filter(Boolean);
  return [c.image1,c.image2].filter(Boolean);
}

function cardImgClick(id){
  const c=cards.find(x=>x.id===id);if(!c)return;
  const images=getCardImages(c);
  const idx=window._slideIdx[id]||0;
  openLightbox(images,idx);
}

function renderCards(){
  const q=document.getElementById('search').value.toLowerCase();
  const list=cards.filter(c=>{
    if(filter!=='all'&&c.series!==filter)return false;
    if(gradeFilter&&c.grade!==gradeFilter)return false;
    if(q&&!(c.name||'').toLowerCase().includes(q)&&!(c.set_name||'').toLowerCase().includes(q))return false;
    return true;
  });
  const g=document.getElementById('card-grid');
  if(!list.length){g.innerHTML=`<div class="empty">${t('empty')}</div>`;return;}
  g.innerHTML=list.map(c=>{
    const images=getCardImages(c);
    const hasMultiple=images.length>1;
    const slides=images.length>0
      ?images.map(img=>`<div class="slide"><img src="${img}" alt="${c.name||''}"></div>`).join('')
      :`<div class="slide"><div class="placeholder-icon">🃏</div></div>`;
    const counter=hasMultiple?`<span class="slide-counter" id="ctr-${c.id}">1 / ${images.length}</span>`:'';
    const arrows=hasMultiple?`<button class="slide-arrow left" onclick="cardSlide(${c.id},-1,${images.length},event)">‹</button><button class="slide-arrow right" onclick="cardSlide(${c.id},1,${images.length},event)">›</button>`:'';
    const gradeBadge=c.grade?`<span class="grade-badge">${gradeLabel(c.grade)}</span>`:'';
    const isFav=currentUser&&favoriteIds.has(c.id);
    const heartBtn=`<button class="fav-heart-btn ${isFav?'favorited':''}" onclick="toggleFavorite(${c.id},event)" title="${currentUser?'Favorite':'Login to favorite'}">${isFav?'❤️':'🤍'}</button>`;
    return`<div class="card" id="card-${c.id}">
      <div class="card-img-wrap" onclick="cardImgClick(${c.id})">
        <div class="slider-track" id="track-${c.id}">${slides}</div>
        ${counter}${arrows}
        <span class="img-zoom-hint">🔍 zoom</span>
      </div>
      <div class="card-body">
        <div class="card-name" title="${c.name||''}">${c.name||'—'}</div>
        <div class="card-meta">${c.set_name||'—'} · ${c.date||'—'}</div>
        <div class="badge-row">${seriesBadge(c.series||'other')}${gradeBadge}</div>
        <div class="card-price">🇹🇭 ฿${fmt(c.thb)}</div>
        <div class="status-row">
          <button class="status-pill ${c.status==='available'?'status-available':'status-sold'} ${isAdmin?'clickable':''}"
            onclick="${isAdmin?`toggleStatus(${c.id})`:'void(0)'}">${c.status==='available'?t('available'):t('sold')}</button>
          ${heartBtn}
        </div>
        <div class="btn-row">
          <button class="btn-fb ${c.status==='sold'?'disabled':''}" onclick="openContact(${c.id})">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            ${t('contact')}
          </button>
          ${isAdmin?`<button class="btn-edit" onclick="openEditModal(${c.id})">✏️</button><button class="btn-del" onclick="deleteCard(${c.id})">🗑️</button>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  list.forEach(c=>{if(!window._slideIdx[c.id])window._slideIdx[c.id]=0;});
}

  document.getElementById('f-grade').value='';
  document.getElementById('f-date').value='';

  document.getElementById('lbl-grade').textContent=t('lGrade');

  document.getElementById('cancel-btn').textContent=t('cancel');
  document.getElementById('form-overlay').classList.remove('hidden');

function openEditModal(id){

  imgList=getCardImages(c);
  renderImgGrid();
  document.getElementById('form-title').textContent=t('editTitle');
  document.getElementById('f-name').value=c.name||'';
  document.getElementById('f-series').value=c.series||'pokemon';
  document.getElementById('f-grade').value=c.grade||'';
  document.getElementById('f-set').value=c.set_name||'';
  document.getElementById('f-date').value=c.date||'';
  document.getElementById('f-thb').value=c.thb||'';
  document.getElementById('f-status').value=c.status||'available';

  document.getElementById('lbl-grade').textContent=t('lGrade');
  document.getElementById('save-btn').textContent=t('save');
  document.getElementById('cancel-btn').textContent=t('cancel');
  document.getElementById('form-overlay').classList.remove('hidden');

async function saveCard(){
  const name=document.getElementById('f-name').value.trim();if(!name)return;
  if(imgList.includes('uploading')){showToast('Please wait for photos to finish uploading',true);return;}
  const data={
    name,
    series:document.getElementById('f-series').value,
    grade:document.getElementById('f-grade').value||null,
    set_name:document.getElementById('f-set').value.trim(),
    date:document.getElementById('f-date').value,
    thb:parseFloat(document.getElementById('f-thb').value)||0,
    status:document.getElementById('f-status').value,
    image1:imgList[0]||null,
    image2:imgList[1]||null,
    sort_order:Date.now()
  };
  try{
    if(editId){await dbUpdate(editId,{...data,images:imgList});}
    else{await dbInsert({...data,images:imgList});}
    closeFormModal();showToast(t('saved'));
    await dbFetch();
  }catch(e){
    try{
      if(editId){await dbUpdate(editId,data);}
      else{await dbInsert(data);}
      closeFormModal();showToast(t('saved'));
      await dbFetch();
    }catch(e2){
      showToast('Save failed: '+e2.message,true);
    }
  }
}

async function deleteCard(id){
  if(!confirm('Delete this card?'))return;
  try{await dbDelete(id);showToast(t('deleted'));await dbFetch();}
  catch(e){showToast('Delete failed',true);}
}

function closeFormModal(){document.getElementById('form-overlay').classList.add('hidden');editId=null;imgList=[];}
